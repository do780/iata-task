name: Monthly Data Fetch

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run data fetcher
        env:
          IATA_CARRIER_FILE: carrier_data_full.jsonl
          IATA_AIRPORT_FILE: airport_data_full.jsonl
        run: uv run iata-fetch

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add carrier_data_full.jsonl airport_data_full.jsonl fetch_state.jsonl
          if git diff --cached --quiet; then
            echo "No JSONL updates to commit."
            exit 0
          fi
          git commit -m "Update IATA JSONL data"
          git push
